name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn --batch-mode verify

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync pom.xml version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Package
        run: mvn --batch-mode package -DskipTests

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "FacotoContainer ${{ github.ref_name }}"
          generate_release_notes: true
          files: target/facoto-container-${{ steps.version.outputs.version }}.jar
